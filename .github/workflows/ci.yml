name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
      - name: Init + mock run
        run: |
          superai init --non-interactive
          superai run "say hello" --format json
      - name: Backup create + verify
        run: |
          superai backup --full
          superai backup-verify
