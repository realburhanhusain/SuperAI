[project]
name = "superai"
version = "0.1.0"
description = "SuperAI - Full-featured multi-model AI super app with supervisor-worker orchestration, self-learning Memory Palace (ChromaDB), external CLI delegation, and personal assistant capabilities."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "typer[all]>=0.9",
    "rich>=13.0",
    "chromadb>=0.5.0",
]

[project.scripts]
superai = "src.run_prototype:main"

[tool.setuptools.packages.find]
where = ["src"]
